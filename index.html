```html
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Arcade Pro Game</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: radial-gradient(circle, #0f2027, #203a43, #2c5364);
  font-family: Arial;
  color: white;
}

#hud {
  position: fixed;
  top: 10px;
  left: 10px;
  font-size: 18px;
}

canvas {
  display: block;
}
</style>
</head>

<body>

<div id="hud">
  Pontos: <span id="score">0</span> |
  Recorde: <span id="highScore">0</span>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let keys = {};
let bullets = [];
let enemies = [];
let score = 0;
let highScore = localStorage.getItem("highScore") || 0;

document.getElementById("highScore").textContent = highScore;

const player = {
  x: canvas.width / 2,
  y: canvas.height - 100,
  size: 20,
  speed: 5
};

document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

document.addEventListener("click", () => {
  bullets.push({ x: player.x, y: player.y, speed: 7 });
});

function spawnEnemy() {
  enemies.push({
    x: Math.random() * canvas.width,
    y: -20,
    size: 20,
    speed: 2 + Math.random() * 2
  });
}

setInterval(spawnEnemy, 1000);

function update() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Movimento
  if (keys["ArrowLeft"]) player.x -= player.speed;
  if (keys["ArrowRight"]) player.x += player.speed;

  // Player
  ctx.fillStyle = "cyan";
  ctx.beginPath();
  ctx.arc(player.x, player.y, player.size, 0, Math.PI * 2);
  ctx.fill();

  // Bullets
  bullets.forEach((b, i) => {
    b.y -= b.speed;
    ctx.fillStyle = "yellow";
    ctx.fillRect(b.x - 2, b.y, 4, 10);

    if (b.y < 0) bullets.splice(i, 1);
  });

  // Enemies
  enemies.forEach((e, ei) => {
    e.y += e.speed;

    ctx.fillStyle = "red";
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.size, 0, Math.PI * 2);
    ctx.fill();

    // Colisão com player
    let dx = e.x - player.x;
    let dy = e.y - player.y;
    let dist = Math.sqrt(dx * dx + dy * dy);

    if (dist < e.size + player.size) {
      alert("Game Over! Pontos: " + score);
      if (score > highScore) {
        localStorage.setItem("highScore", score);
      }
      location.reload();
    }

    // Colisão com bala
    bullets.forEach((b, bi) => {
      let dx = e.x - b.x;
      let dy = e.y - b.y;
      let dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < e.size) {
        enemies.splice(ei, 1);
        bullets.splice(bi, 1);
        score++;
        document.getElementById("score").textContent = score;
      }
    });

    if (e.y > canvas.height) enemies.splice(ei, 1);
  });

  requestAnimationFrame(update);
}

update();
</script>

</body>
</html>
